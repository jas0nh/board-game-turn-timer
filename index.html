<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f4f1ea">
    <meta name="description" content="支持多人回合计时、D&D 物理骰子与区间随机数的桌游工具。">
    <title>回合桌 · 桌游工具</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">TABLETOP UTILITY</p>
          <h1>回合桌</h1>
        </div>
        <p class="topbar-note">桌游工具主页</p>
      </header>

      <nav class="tool-tabs" role="tablist" aria-label="桌游工具">
        <button class="tool-tab selected" id="timerTab" type="button" role="tab" aria-selected="true" aria-controls="timerPanel" data-tool="timer">
          <span>01</span>
          回合计时
        </button>
        <button class="tool-tab" id="diceTab" type="button" role="tab" aria-selected="false" aria-controls="dicePanel" data-tool="dice">
          <span>02</span>
          物理骰子
        </button>
        <button class="tool-tab" id="randomTab" type="button" role="tab" aria-selected="false" aria-controls="randomPanel" data-tool="random">
          <span>03</span>
          随机数
        </button>
      </nav>

      <div class="workspace">
        <section class="timer-workspace tool-panel" id="timerPanel" role="tabpanel" aria-labelledby="timerTab">
          <div class="section-heading">
            <div>
              <p class="section-index">01 / TURN TIMER</p>
              <h2 id="timerTitle">多人回合计时</h2>
            </div>
            <button class="icon-button" id="timerSettingsBtn" type="button" aria-label="计时设置" title="计时设置">
              <span aria-hidden="true">⚙</span>
            </button>
          </div>

          <div class="timer-setup" id="timerSetup">
            <div class="setup-row">
              <span>玩家人数</span>
              <div class="stepper" role="group" aria-label="玩家人数">
                <button id="removePlayerBtn" type="button" aria-label="减少玩家">−</button>
                <output id="playerCount" aria-live="polite">2</output>
                <button id="addPlayerBtn" type="button" aria-label="增加玩家">＋</button>
              </div>
            </div>

            <div class="players-editor" id="playersEditor"></div>

            <div class="setup-actions">
              <label class="start-player-label" for="startPlayerSelect">
                首位玩家
                <select id="startPlayerSelect"></select>
              </label>
              <button class="primary-button" id="startGameBtn" type="button">开始对局</button>
            </div>
          </div>

          <div class="timer-game" id="timerGame" hidden>
            <div class="duel-timer" id="duelTimer" hidden>
              <button class="duel-player duel-player-top" id="duelPlayer0" type="button" data-duel-player="0">
                <span class="duel-player-inner">
                  <span class="duel-meta"><span id="duelName0">玩家 1</span><span id="duelStatus0">等待</span></span>
                  <time id="duelTime0">05:00</time>
                  <span class="duel-action">完成回合，交给对方</span>
                </span>
              </button>

              <div class="duel-center">
                <p id="duelRound">第 1 回合</p>
                <button class="secondary-button" id="duelPauseBtn" type="button">开始计时</button>
              </div>

              <button class="duel-player duel-player-bottom" id="duelPlayer1" type="button" data-duel-player="1">
                <span class="duel-player-inner">
                  <span class="duel-meta"><span id="duelName1">玩家 2</span><span id="duelStatus1">等待</span></span>
                  <time id="duelTime1">05:00</time>
                  <span class="duel-action">完成回合，交给对方</span>
                </span>
              </button>
            </div>

            <div class="multi-timer" id="multiTimer" hidden>
              <div class="active-player" id="activePlayerCard" role="button" tabindex="0" aria-label="结束当前回合">
                <div class="active-topline">
                  <span id="activePosition">玩家 1 · 第 1 回合</span>
                  <span class="live-indicator" id="liveIndicator">待开始</span>
                </div>
                <p class="active-name" id="activeName">玩家 1</p>
                <time class="active-time" id="activeTime">05:00</time>
                <p class="tap-hint">点击此区域结束回合</p>
              </div>

              <div class="player-strip" id="playerStrip" role="group" aria-label="玩家计时概览"></div>

              <div class="timer-controls">
                <button class="secondary-button" id="pauseBtn" type="button">开始计时</button>
                <button class="primary-button next-button" id="nextTurnBtn" type="button" disabled>下一位</button>
              </div>
              <p class="timer-status" id="timerStatus" aria-live="polite">设置完成，等待开始计时</p>
            </div>
          </div>
        </section>

        <section class="dice-workspace tool-panel" id="dicePanel" role="tabpanel" aria-labelledby="diceTab" hidden>
          <div class="section-heading">
            <div>
              <p class="section-index">02 / DICE TRAY</p>
              <h2 id="diceTitle">D&amp;D 物理骰子</h2>
            </div>
            <div class="dice-total" aria-live="polite">
              <span>结果</span>
              <strong id="diceResult">—</strong>
            </div>
          </div>

          <div class="dice-selector" id="diceSelector" role="radiogroup" aria-label="选择骰子">
            <button type="button" data-die="d4" role="radio" aria-checked="false">d4</button>
            <button type="button" data-die="d6" role="radio" aria-checked="true" class="selected">d6</button>
            <button type="button" data-die="d8" role="radio" aria-checked="false">d8</button>
            <button type="button" data-die="d10" role="radio" aria-checked="false">d10</button>
            <button type="button" data-die="d12" role="radio" aria-checked="false">d12</button>
            <button type="button" data-die="d20" role="radio" aria-checked="false">d20</button>
            <button type="button" data-die="d100" role="radio" aria-checked="false">d%</button>
          </div>

          <button class="dice-stage" id="diceStage" type="button" aria-label="点击抛骰子">
            <span class="dice-loading" id="diceLoading">正在准备物理骰子…</span>
            <span class="fallback-die" id="fallbackDie" hidden aria-hidden="true">6</span>
          </button>

          <div class="roll-bar">
            <div>
              <p class="roll-label" id="rollLabel">六面骰</p>
              <p class="roll-detail" id="rollDetail">点击骰子或按钮进行投掷</p>
            </div>
            <button class="roll-button" id="rollBtn" type="button">抛骰子</button>
          </div>

          <div class="history-block">
            <div class="history-heading">
              <span>最近结果</span>
              <button id="clearHistoryBtn" type="button">清空</button>
            </div>
            <ol class="roll-history" id="rollHistory">
              <li class="empty-history">还没有投掷记录</li>
            </ol>
          </div>

          <div class="distribution-block">
            <div class="distribution-heading">
              <div>
                <span>出数分布</span>
                <strong id="histogramSummary">d6 · 0 次投掷</strong>
              </div>
              <button id="clearStatsBtn" type="button">重置当前骰子</button>
            </div>
            <div class="histogram" id="histogram" role="img" aria-label="d6 出数分布"></div>
          </div>
        </section>

        <section class="random-workspace tool-panel" id="randomPanel" role="tabpanel" aria-labelledby="randomTab" hidden>
          <div class="section-heading">
            <div>
              <p class="section-index">03 / RANDOM NUMBER</p>
              <h2>简单随机数</h2>
            </div>
            <div class="dice-total" aria-live="polite">
              <span>结果</span>
              <strong id="randomResult">—</strong>
            </div>
          </div>

          <div class="random-controls">
            <label>
              下限
              <input id="randomMin" type="number" inputmode="numeric" min="-1000000" max="1000000" step="1" value="1">
            </label>
            <label>
              上限
              <input id="randomMax" type="number" inputmode="numeric" min="-1000000" max="1000000" step="1" value="100">
            </label>
            <button class="primary-button" id="generateRandomBtn" type="button">生成随机数</button>
          </div>

          <button class="random-stage" id="randomStage" type="button" aria-label="生成随机数">
            <span class="random-range-label" id="randomRangeLabel">1–100</span>
            <strong id="randomStageValue">—</strong>
            <span>点击生成</span>
          </button>

          <div class="history-block">
            <div class="history-heading">
              <span>最近结果</span>
              <button id="clearRandomHistoryBtn" type="button">清空</button>
            </div>
            <ol class="roll-history" id="randomHistory">
              <li class="empty-history">还没有随机数记录</li>
            </ol>
          </div>

          <div class="distribution-block">
            <div class="distribution-heading">
              <div>
                <span>随机数分布</span>
                <strong id="randomHistogramSummary">1–100 · 0 次生成</strong>
              </div>
              <button id="clearRandomStatsBtn" type="button">重置分布</button>
            </div>
            <div class="histogram random-histogram" id="randomHistogram" role="img" aria-label="1 到 100 随机数分布"></div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
